name: JustLogIt
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "27.0"
  xcodeVersion: "27.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
packages:
  JustLogItCore:
    path: Packages/JustLogItCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CODE_SIGN_STYLE: Automatic
targets:
  JustLogIt:
    type: application
    platform: iOS
    sources:
      - path: JustLogIt
        excludes:
          - Resources/Info.plist
          - Resources/Info-Debug.plist
          - Resources/JustLogIt.entitlements
    dependencies:
      - package: JustLogItCore
      - sdk: HealthKit.framework
    settings:
      base:
        PRODUCT_NAME: JustLogIt
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: JustLogIt/Resources/JustLogIt.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          INFOPLIST_FILE: JustLogIt/Resources/Info-Debug.plist
        Release:
          INFOPLIST_FILE: JustLogIt/Resources/Info.plist
    preBuildScripts:
      - name: Validate Release Configuration
        script: '"$SRCROOT/Scripts/validate-release-configuration.sh"'
        inputFiles:
          - $(SRCROOT)/Scripts/validate-release-configuration.sh
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Verify Release Product
        script: '"$SRCROOT/Scripts/verify-release-product.sh"'
        inputFiles:
          - $(SRCROOT)/Scripts/verify-release-product.sh
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Info.plist
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/$(EXECUTABLE_NAME)
        basedOnDependencyAnalysis: false
    scheme:
      testTargets:
        - JustLogItTests
        - JustLogItUITests
      gatherCoverageData: true
  JustLogItTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JustLogItTests
    dependencies:
      - target: JustLogIt
      - package: JustLogItCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
  JustLogItUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JustLogItUITests
    dependencies:
      - target: JustLogIt
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
